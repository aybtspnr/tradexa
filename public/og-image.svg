<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0F111A" />
      <stop offset="50%" stop-color="#1A1C2E" />
      <stop offset="100%" stop-color="#0F111A" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#D80E16" />
      <stop offset="100%" stop-color="#FF4D4D" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D80E16" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#D80E16" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Glow effect -->
  <circle cx="200" cy="315" r="400" fill="url(#glow)" />
  <circle cx="1000" cy="315" r="300" fill="url(#glow)" />

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo icon (globe + arrows) -->
  <g transform="translate(100, 215)">
    <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#accent)" />
    <circle cx="100" cy="100" r="52" fill="none" stroke="white" stroke-width="7" opacity="0.9"/>
    <ellipse cx="100" cy="100" rx="28" ry="52" fill="none" stroke="white" stroke-width="5" opacity="0.7"/>
    <line x1="48" y1="100" x2="152" y2="100" stroke="white" stroke-width="5" opacity="0.7"/>
    <path d="M64 76 L88 76 L88 60" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M136 124 L112 124 L112 140" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="360" y="240" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
    TRADEXA
  </text>
  <text x="360" y="310" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif" font-size="36" font-weight="500" fill="#94A3B8" letter-spacing="-0.5">
    Inteligência Comercial para Comércio Exterior
  </text>

  <!-- Features -->
  <g transform="translate(360, 370)">
    <rect x="0" y="0" width="180" height="44" rx="22" fill="#D80E16" fill-opacity="0.15"/>
    <text x="90" y="27" font-family="monospace" font-size="16" font-weight="700" fill="#D80E16" text-anchor="middle">NCM / HS</text>

    <rect x="200" y="0" width="200" height="44" rx="22" fill="#D80E16" fill-opacity="0.15"/>
    <text x="300" y="27" font-family="monospace" font-size="16" font-weight="700" fill="#D80E16" text-anchor="middle">Tarifas Globais</text>

    <rect x="420" y="0" width="200" height="44" rx="22" fill="#D80E16" fill-opacity="0.15"/>
    <text x="520" y="27" font-family="monospace" font-size="16" font-weight="700" fill="#D80E16" text-anchor="middle">Smart Ranking</text>
  </g>

  <!-- Footer -->
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="18" fill="#64748B" text-anchor="middle">
    tradexa.com.br
  </text>
  <line x1="450" y1="575" x2="750" y2="575" stroke="#D80E16" stroke-width="2" stroke-opacity="0.5" />
</svg>
